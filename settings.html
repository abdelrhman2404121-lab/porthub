<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHub | Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .settings-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .settings-nav button {
            text-align: left;
            padding: 10px 15px;
            background: none;
            border: none;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .settings-nav button:hover, .settings-nav button.active {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-weight: 500;
        }
        .settings-section {
            display: none;
        }
        .settings-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <i class="fas fa-layer-group"></i> PortHub
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="profile.html?id=me"><i class="fas fa-user"></i> My Profile</a></li>
                    <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a></li>
                    <li style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                        <a href="explore.html"><i class="fas fa-compass"></i> Explore</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content" id="main-content">
            <!-- Navbar -->
            <nav class="navbar">
                <div class="nav-left">
                    <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h2>Settings</h2>
                </div>
                <div class="nav-right">
                    <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon" id="theme-icon"></i></button>
                    <div class="user-menu-section" id="user-menu-section">
                        <div class="user-menu" id="user-menu">
                            <span id="user-greeting">Hi, User</span>
                            <img src="https://i.pravatar.cc/150?img=3" alt="Avatar" class="user-avatar" id="nav-avatar">
                            <i class="fas fa-chevron-down text-sm"></i>
                            <div class="dropdown-menu" id="user-dropdown">
                                <a href="profile.html?id=me">My Profile</a>
                                <a href="settings.html">Settings</a>
                                <hr>
                                <a href="#" id="logout-btn">Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="page-content animate-fade-in">
                <div class="grid grid-cols-4">
                    <div class="col-span-1" style="grid-column: span 1;">
                        <div class="card settings-nav">
                            <button class="active" data-target="section-account">Account & Profile</button>
                            <button data-target="section-privacy">Privacy</button>
                            <button data-target="section-security">Security</button>
                        </div>
                    </div>

                    <div class="col-span-3" style="grid-column: span 3;">
                        <!-- Account Section -->
                        <div id="section-account" class="card settings-section active">
                            <h3 class="mb-4">Account & Profile Information</h3>
                            <form id="form-account">
                                <div class="grid grid-cols-2">
                                    <div class="form-group">
                                        <label>Full Name</label>
                                        <input type="text" id="set-name" class="form-control" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Professional Title</label>
                                        <input type="text" id="set-title" class="form-control">
                                    </div>
                                </div>
                                <div class="grid grid-cols-2">
                                    <div class="form-group">
                                        <label>Email Address</label>
                                        <input type="email" id="set-email" class="form-control" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Phone Number</label>
                                        <input type="text" id="set-phone" class="form-control">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Bio</label>
                                    <textarea id="set-bio" class="form-control" rows="4"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Avatar URL (Profile Picture)</label>
                                    <input type="text" id="set-avatar" class="form-control">
                                </div>
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </form>
                        </div>

                        <!-- Privacy Section -->
                        <div id="section-privacy" class="card settings-section">
                            <h3 class="mb-4">Privacy Settings</h3>
                            <form id="form-privacy">
                                <div class="form-group flex justify-between items-center mb-4">
                                    <div>
                                        <label style="margin-bottom: 0;">Show Email on Profile</label>
                                        <p class="text-sm text-secondary">Allow others to see your email address.</p>
                                    </div>
                                    <input type="checkbox" id="priv-email" style="transform: scale(1.5);">
                                </div>
                                <div class="form-group flex justify-between items-center mb-4">
                                    <div>
                                        <label style="margin-bottom: 0;">Show Phone on Profile</label>
                                        <p class="text-sm text-secondary">Allow others to see your phone number.</p>
                                    </div>
                                    <input type="checkbox" id="priv-phone" style="transform: scale(1.5);">
                                </div>
                                <button type="submit" class="btn btn-primary">Save Privacy</button>
                            </form>
                        </div>

                        <!-- Security Section -->
                        <div id="section-security" class="card settings-section">
                            <h3 class="mb-4">Change Password</h3>
                            <form id="form-security">
                                <div class="form-group">
                                    <label>Current Password</label>
                                    <input type="password" id="sec-current" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>New Password</label>
                                    <input type="password" id="sec-new" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>Confirm New Password</label>
                                    <input type="password" id="sec-confirm" class="form-control">
                                </div>
                                <div id="sec-error" class="error-message mb-4"></div>
                                <button type="submit" class="btn btn-primary">Update Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="footer">
                <p>&copy; 2026 PortfolioHub. All rights reserved.</p>
            </footer>
        </main>
    </div>
    <script src="js/main.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
