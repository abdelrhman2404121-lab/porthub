<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHub | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
      <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
    <div class="auth-container animate-fade-in" style="padding: 40px 20px;">
        <div class="auth-card" style="max-width: 500px;">
            <div class="mb-4 text-center">
                <a href="index.html" class="sidebar-logo" style="justify-content: center; font-size: 2rem;">
                    <i class="fas fa-layer-group"></i> PortHub
                </a>
            </div>
            <h2>Create an Account</h2>
            <p>Join the community and build your portfolio</p>
            
            <form id="register-form" style="text-align: left;">
                <div class="form-group mb-4">
                    <label class="mb-2 block">Account Type</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer p-3 border rounded" style="flex: 1; border-color: var(--primary-color); background: rgba(59,130,246,0.1);">
                            <input type="radio" name="reg-role" value="individual" checked>
                            <i class="fas fa-user text-primary"></i> Individual
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer p-3 border rounded" style="flex: 1; border-color: var(--border-color);">
                            <input type="radio" name="reg-role" value="company">
                            <i class="fas fa-building text-secondary"></i> Company
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label id="name-label">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe or Company Name">
                    <span class="error-message" id="reg-name-error">Name is required</span>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="john@example.com">
                    <span class="error-message" id="reg-email-error">Please enter a valid email</span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••">
                    <span class="error-message" id="reg-password-error">Password must be at least 6 characters</span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••">
                    <span class="error-message" id="reg-confirm-error">Passwords do not match</span>
                </div>
                
                <button type="submit" class="btn btn-primary w-full">Create Account</button>
            </form>
            
            <p class="mt-4 text-sm">Already have an account? <a href="login.html">Login</a></p>
            <p class="mt-2"><a href="index.html" class="text-secondary text-sm"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/register.js"></script>
    <!-- === AI CHATBOT WIDGET === -->
<div id="ph-chatbot-widget">
  <button id="ph-chat-toggle" type="button" title="AI Career Advisor">💬</button>
  <div id="ph-chat-window" class="ph-chat-hidden">
    <div id="ph-chat-header">
      <span>AI Career Advisor</span>
      <button id="ph-chat-close" type="button">✖</button>
    </div>
    <div id="ph-chat-messages"></div>
    <div id="ph-chat-input-area">
      <input type="text" id="ph-chat-input" placeholder="Ask about interviews, salaries..." autocomplete="off">
      <button id="ph-chat-send" type="button">➤</button>
    </div>
  </div>
</div>

<!-- === CHATBOT SCRIPT === -->
<script src="js/chatbot.js"></script>
</body>
</html>
