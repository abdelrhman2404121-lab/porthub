<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortfolioHub | Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <i class="fas fa-layer-group"></i> PortHub
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="explore.html"><i class="fas fa-compass"></i> Explore</a></li>
                    <li><a href="projects.html"><i class="fas fa-briefcase"></i> Projects</a></li>
                    <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                    <li><a href="messages.html" class="active"><i class="fas fa-comments"></i> Messages</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content" id="main-content">
            <!-- Navbar -->
            <nav class="navbar">
                <div class="nav-left">
                    <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <form class="search-bar" id="global-search-form">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search messages...">
                    </form>
                </div>
                <div class="nav-right">
                    <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon" id="theme-icon"></i></button>
                    <div class="auth-links flex gap-2" id="auth-links" style="display: none;">
                        <a href="login.html" class="btn btn-outline">Login</a>
                        <a href="register.html" class="btn btn-primary">Register</a>
                    </div>
                    <div class="user-menu-section" id="user-menu-section">
                        <div class="user-menu" id="user-menu">
                            <span id="user-greeting">Hi, Guest</span>
                            <img src="https://i.pravatar.cc/150?img=3" alt="Avatar" class="user-avatar" id="nav-avatar">
                            <i class="fas fa-chevron-down text-sm"></i>
                            <div class="dropdown-menu" id="user-dropdown">
                                <a href="dashboard.html">Dashboard</a>
                                <a href="profile.html?id=me">My Profile</a>
                                <a href="#" id="logout-btn">Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="page-content animate-fade-in">
                <div class="messages-container">
                    <!-- Chat List (Left Side) -->
                    <div class="chat-list">
                        <div id="requests-section" style="display: none;">
                            <h3>Message Requests</h3>
                            <div id="requests-list" class="requests-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                        <h3>Conversations</h3>
                        <div id="chat-list" class="chat-list-items">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Chat Window (Right Side) -->
                    <div class="chat-window">
                        <div id="chat-header" class="chat-header">
                            <div id="chat-user-info">
                                <img id="chat-avatar" src="" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
                                <span id="chat-name">Select a conversation</span>
                            </div>
                        </div>
                        <div id="chat-messages" class="chat-messages">
                            <!-- Messages will be displayed here -->
                        </div>
                        <div class="chat-input">
                            <input type="text" id="message-input" placeholder="Type a message..." class="form-control">
                            <button id="send-btn" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <p>&copy; 2026 PortfolioHub. All rights reserved.</p>
            </footer>
        </main>
    </div>
    <script src="js/main.js"></script>
    <script src="js/messages.js"></script>
   <!-- === AI CHATBOT WIDGET === -->
<div id="ph-chatbot-widget">
  <button id="ph-chat-toggle" type="button" title="AI Career Advisor">💬</button>
  <div id="ph-chat-window" class="ph-chat-hidden">
    <div id="ph-chat-header">
      <span>AI Career Advisor</span>
      <button id="ph-chat-close" type="button">✖</button>
    </div>
    <div id="ph-chat-messages"></div>
    <div id="ph-chat-input-area">
      <input type="text" id="ph-chat-input" placeholder="Ask about interviews, salaries..." autocomplete="off">
      <button id="ph-chat-send" type="button">➤</button>
    </div>
  </div>
</div>

<!-- === CHATBOT SCRIPT === -->
<script src="js/chatbot.js"></script>
</body>
</html>
